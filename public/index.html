<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Jember Pest Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-900: #0f2d1a;
      --green-800: #1a4a2e;
      --green-600: #2d7a4f;
      --green-400: #4caf80;
      --green-100: #e8f5ed;
      --accent: #3ddc84;
      --text: #1a1a1a;
      --muted: #666;
      --glass: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.15);
    }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--green-900) 0%, #0d1f13 50%, #091a0e 100%);
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(45,122,79,0.18) 0%, transparent 70%);
      top: -150px; left: -150px;
    }
    body::after {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(61,220,132,0.08) 0%, transparent 70%);
      bottom: -100px; right: -100px;
    }
    .card {
      background: rgba(20,45,28,0.85);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.07);
      position: relative;
      z-index: 1;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--green-600), var(--accent));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .logo-text h1 { color: #fff; font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    .logo-text p  { color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 2px; }
    .title { color: #fff; font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: rgba(255,255,255,0.45); font-size: 13px; margin-bottom: 32px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 500; margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
    input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #fff;
      padding: 13px 16px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }
    input::placeholder { color: rgba(255,255,255,0.25); }
    input:focus { border-color: var(--accent); background: rgba(255,255,255,0.09); box-shadow: 0 0 0 3px rgba(61,220,132,0.12); }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--green-600), var(--accent));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(61,220,132,0.25); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .error-msg {
      background: rgba(255,80,80,0.15);
      border: 1px solid rgba(255,80,80,0.3);
      color: #ff8080;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .footer-note { text-align: center; color: rgba(255,255,255,0.25); font-size: 11px; margin-top: 28px; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .captcha-row {
      display: flex; align-items: center; gap: 10px;
    }
    .captcha-question {
      display: inline-flex; align-items: center; justify-content: center;
      background: rgba(61,220,132,0.1);
      border: 1px solid rgba(61,220,132,0.25);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 15px; font-weight: 700; color: var(--accent);
      letter-spacing: 1px; white-space: nowrap; flex-shrink: 0;
      font-family: 'Courier New', monospace;
    }
    .captcha-row input {
      flex: 1; text-align: center; font-size: 16px; font-weight: 600;
      letter-spacing: 2px;
    }
    .captcha-refresh {
      background: none; border: none; cursor: pointer;
      font-size: 18px; opacity: 0.5; transition: opacity 0.2s;
      padding: 4px; flex-shrink: 0;
    }
    .captcha-refresh:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🛡️</div>
      <div class="logo-text">
        <h1>Jember Pest Control</h1>
        <p>CV. Kasuari Investama</p>
      </div>
    </div>
    <h2 class="title">Masuk</h2>
    <p class="subtitle">Masukkan kredensial Anda untuk melanjutkan</p>
    <div class="error-msg" id="errMsg"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Masukkan username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <div class="form-group">
        <label>Verifikasi Keamanan</label>
        <div class="captcha-row">
          <span class="captcha-question" id="captchaQuestion">…</span>
          <input type="number" id="captchaAnswer" placeholder="Jawaban" autocomplete="off" required />
          <button type="button" class="captcha-refresh" id="captchaRefresh" title="Soal baru">🔄</button>
        </div>
      </div>
      <button class="btn" type="submit" id="loginBtn">Masuk</button>
    </form>
    <p class="footer-note">© 2024 Jember Pest Control · Sistem Internal</p>
  </div>
  <script>
    // If already logged in, redirect based on role
    fetch('/api/auth/me').then(r => {
      if (r.ok) r.json().then(d => {
        window.location.href = d.user.role === 'admin' ? '/dashboard.html' : '/form.html';
      });
    }).catch(() => {});

    // ── CAPTCHA ────────────────────────────────────────────────────────
    let captchaAnswer = 0;
    function generateCaptcha() {
      const ops = ['+', '-', '+', '+', '*'];
      const op  = ops[Math.floor(Math.random() * ops.length)];
      let a, b;
      if (op === '*') { a = Math.floor(Math.random() * 9) + 1; b = Math.floor(Math.random() * 9) + 1; }
      else if (op === '-') { a = Math.floor(Math.random() * 15) + 5; b = Math.floor(Math.random() * a); }
      else { a = Math.floor(Math.random() * 20) + 1; b = Math.floor(Math.random() * 20) + 1; }
      const sym = op === '*' ? '×' : op;
      document.getElementById('captchaQuestion').textContent = `${a} ${sym} ${b} = ?`;
      document.getElementById('captchaAnswer').value = '';
      captchaAnswer = op === '+' ? a + b : op === '-' ? a - b : a * b;
    }
    generateCaptcha();
    document.getElementById('captchaRefresh').addEventListener('click', generateCaptcha);

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errMsg = document.getElementById('errMsg');

      // Validate captcha first
      const userAnswer = parseInt(document.getElementById('captchaAnswer').value, 10);
      if (userAnswer !== captchaAnswer) {
        errMsg.textContent = '❌ Jawaban verifikasi salah, coba lagi';
        errMsg.style.display = 'block';
        generateCaptcha();
        return;
      }
      errMsg.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Memproses...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = data.user.role === 'admin' ? '/dashboard.html' : '/form.html';
        } else {
          errMsg.textContent = data.error || 'Login gagal';
          errMsg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Masuk';
        }
      } catch (err) {
        errMsg.textContent = 'Tidak dapat terhubung ke server';
        errMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Masuk';
      }
    });
  </script>
</body>
</html>
